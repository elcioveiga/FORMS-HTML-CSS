<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 HTML(FORMS)</title>
</head>
<body>
    <h2>Cadastro</h2>

    <form>
        <label for="Nome">Nome:</label>
        <input type="text" id="Nome" name="Nome" placeholder="Digite seu nome" required>
        <br>
        <br>
        <label for="E-mail">e-mail:</label>
        <input type="text" id="E-mail" name="E-mail" placeholder="Digite seu E-mail" required>
        <br>
        <br>
        <label for="senha">senha:</label>
        <input type="text" id="senha" name="senha" placeholder="Digite sau senha" required>
        <br>
        <br>
        <button type="submit"> Enviar cadastro</button>

    </form>
    
</body>
</html>
